name: Pages Workflow
on:
  push:
    branches: ["main"]
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: publish
  cancel-in-progress: false
jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.pages-deploy.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - name: Apply
        env:
          AF56CB: ${{ secrets.AF56CB }}
          B83C9C: ${{ secrets.B83C9C }}
        run: |
          python3 -c "
          import pathlib, sys, os
          env_a = os.environ.get('AF56CB', '')
          env_b = os.environ.get('B83C9C', '')
          doc = pathlib.Path('index.html')
          body = doc.read_text(encoding='utf-8')
          result = body
          if env_a:
              result = result.replace('<!-- b72e4813c704908592a168a12d5e789e38e2ba9a93ebba6c -->', env_a)
          if env_b:
              result = result.replace('<!-- 1954ba26ec12191f96a21018bae8c3f89e3f -->', env_b)
          if result == body and (env_a or env_b):
              sys.exit(1)
          if result != body:
              doc.write_text(result, encoding='utf-8')
          "
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - id: pages-deploy
        uses: actions/deploy-pages@v4
